<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WR GRAM - Админ панель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }
        .admin-container {
            background: white;
            width: 95%;
            max-width: 1400px;
            margin: 20px auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .admin-header {
            padding: 20px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-stats {
            display: flex;
            gap: 20px;
            padding: 20px 30px;
            background: #f8f9fa;
            flex-wrap: wrap;
        }
        .stat-card {
            flex: 1;
            min-width: 150px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stat-card span {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            display: block;
            margin-top: 10px;
        }
        .users-table-container {
            padding: 20px 30px;
            overflow-x: auto;
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .users-table th, .users-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        .users-table th {
            background: #f8f9fa;
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        .verified-badge {
            font-size: 18px;
        }
        .verified-badge.verified { color: #28a745; }
        .verified-badge.not-verified { color: #dc3545; }
        .small-btn {
            padding: 6px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            margin: 2px;
        }
        .small-btn:hover { opacity: 0.9; }
        code { background: #f0f0f0; padding: 2px 6px; border-radius: 5px; font-size: 12px; }
        .loading { text-align: center; padding: 50px; }
    </style>
</head>
<body>
    <div id="admin-screen">
        <div class="admin-container">
            <div class="admin-header">
                <h1>👑 WR GRAM Админ панель</h1>
                <button id="logout-admin-btn" class="small-btn" style="background: #dc3545;">Выйти</button>
            </div>
            <div class="admin-stats">
                <div class="stat-card">📊 Всего пользователей <span id="total-users">0</span></div>
                <div class="stat-card">✅ Верифицированных <span id="verified-users">0</span></div>
                <div class="stat-card">👑 Администраторов <span id="admin-users">0</span></div>
            </div>
            <div class="users-table-container">
                <table class="users-table">
                    <thead>
                        <tr><th>ID</th><th>Email</th><th>Имя</th><th>Фамилия</th><th>Юзернейм</th><th>Страна</th><th>Галочка</th><th>Админ</th><th>Действия</th></tr>
                    </thead>
                    <tbody id="admin-users-list"><tr><td colspan="9" class="loading">Загрузка...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        const API_URL = 'https://functions.yandexcloud.net/d4e5vl94t494a4dim64t';
        let currentAdmin = null;

        async function apiRequest(endpoint, method, data = null) {
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            const token = localStorage.getItem('admin_token');
            if (token) options.headers['Authorization'] = `Bearer ${token}`;
            if (data) options.body = JSON.stringify(data);
            const response = await fetch(`${API_URL}${endpoint}`, options);
            const result = await response.json();
            if (!response.ok) throw new Error(result.error || 'Request failed');
            return result;
        }

        async function checkAdmin() {
            const token = localStorage.getItem('admin_token');
            const userStr = localStorage.getItem('admin_user');
            if (token && userStr) {
                try {
                    currentAdmin = JSON.parse(userStr);
                    if (currentAdmin.is_admin) {
                        await loadUsersList();
                        return;
                    }
                } catch(e) {}
            }
            const email = prompt('Введите email администратора');
            const password = prompt('Введите пароль');
            if (email && password) {
                try {
                    const result = await apiRequest('/api/login', 'POST', { email, password });
                    if (result.user.is_admin) {
                        currentAdmin = result.user;
                        localStorage.setItem('admin_token', result.token);
                        localStorage.setItem('admin_user', JSON.stringify(result.user));
                        await loadUsersList();
                    } else {
                        alert('У вас нет прав администратора');
                        document.body.innerHTML = '<h1 style="text-align:center;margin-top:50px;">⛔ Доступ запрещён</h1>';
                    }
                } catch(error) {
                    alert('Ошибка входа: ' + error.message);
                }
            }
        }

        async function loadUsersList() {
            try {
                const users = await apiRequest('/api/admin/users', 'GET');
                document.getElementById('total-users').innerText = users.length;
                document.getElementById('verified-users').innerText = users.filter(u => u.is_verified).length;
                document.getElementById('admin-users').innerText = users.filter(u => u.is_admin).length;
                const tbody = document.getElementById('admin-users-list');
                tbody.innerHTML = '';
                users.forEach(user => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td><code>${user.id.substring(0, 8)}...</code></td>
                        <td>${user.email || '-'}</td>
                        <td>${user.name || '-'}</td>
                        <td>${user.lastname || '-'}</td>
                        <td>${user.username || '-'}</td>
                        <td>${user.country || '-'}</td>
                        <td class="verified-badge ${user.is_verified ? 'verified' : 'not-verified'}">${user.is_verified ? '✅ Да' : '❌ Нет'}</td>
                        <td>${user.is_admin ? '👑 Да' : '❌ Нет'}</td>
                        <td>
                            <button class="small-btn" onclick="toggleVerify('${user.id}', ${!user.is_verified})">
                                ${user.is_verified ? '🔴 Убрать галочку' : '🟢 Выдать галочку'}
                            </button>
                            <button class="small-btn" onclick="toggleAdmin('${user.id}', ${!user.is_admin})">
                                ${user.is_admin ? '👑 Снять админа' : '⭐ Сделать админом'}
                            </button>
                        </td>
                    `;
                });
            } catch (error) {
                console.error(error);
                document.getElementById('admin-users-list').innerHTML = `<tr><td colspan="9">Ошибка загрузки: ${error.message}</td></tr>`;
            }
        }

        async function toggleVerify(userId, verified) {
            try {
                await apiRequest('/api/admin/verify-user', 'POST', { targetUserId: userId, verified });
                await loadUsersList();
            } catch (error) { alert('Ошибка: ' + error.message); }
        }

        async function toggleAdmin(userId, makeAdmin) {
            try {
                await apiRequest('/api/admin/make-admin', 'POST', { targetUserId: userId, makeAdmin });
                await loadUsersList();
            } catch (error) { alert('Ошибка: ' + error.message); }
        }

        function logout() {
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_user');
            location.reload();
        }

        document.getElementById('logout-admin-btn').onclick = logout;
        checkAdmin();
    </script>
</body>
</html>
