<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WR GRAM - Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .auth-container h1, .auth-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #667eea;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            border-radius: 10px;
            font-size: 16px;
        }

        .auth-tab.active {
            background: #667eea;
            color: white;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .auth-input, .modal-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }

        .auth-btn, .modal-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .auth-btn.yandex {
            background: #fc3f1d;
        }

        .auth-btn:hover, .modal-btn:hover {
            opacity: 0.9;
        }

        /* Main interface */
        .main-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: white;
        }

        .sidebar {
            width: 320px;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
            }
            .chat-name, .sidebar .user-info div:not(.avatar-small) {
                display: none;
            }
            .chat-item {
                justify-content: center;
            }
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: #e9ecef;
        }

        .chat-item.active {
            background: #e3f2fd;
        }

        .chat-icon {
            font-size: 24px;
        }

        .chat-name {
            font-weight: 500;
        }

        .sidebar-bottom {
            padding: 15px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-around;
        }

        .bottom-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: #667eea;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .bottom-btn:hover {
            transform: scale(1.05);
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .messages {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            position: relative;
        }

        .message-own {
            align-self: flex-end;
            background: #667eea;
            color: white;
        }

        .message-other {
            align-self: flex-start;
            background: #f1f3f5;
        }

        .message-info {
            font-size: 12px;
            margin-bottom: 5px;
            opacity: 0.7;
        }

        .message-text {
            word-wrap: break-word;
        }

        .message-input-area {
            padding: 15px 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: #667eea;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal-content {
            background: white;
            margin: 50px auto;
            padding: 30px;
            width: 500px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 20px;
            position: relative;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 28px;
            cursor: pointer;
        }

        .modal-btn.danger {
            background: #dc3545;
        }

        .users-list, .invites-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .user-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-item:hover {
            background: #f0f0f0;
        }

        .small-btn {
            padding: 5px 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .username-small {
            font-size: 12px;
            color: #6c757d;
        }

        .chat-type-small {
            font-size: 12px;
            color: #6c757d;
        }

        .info-btn {
            margin-left: auto;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        hr {
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <!-- ЭКРАН АВТОРИЗАЦИИ -->
    <div id="auth-screen" class="screen">
        <div class="auth-container">
            <h1>WR GRAM</h1>
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Вход</button>
                <button class="auth-tab" data-tab="register">Регистрация</button>
            </div>
            
            <div id="login-form" class="auth-form active">
                <input type="email" id="login-email" placeholder="Email" class="auth-input">
                <input type="password" id="login-password" placeholder="Пароль" class="auth-input">
                <button id="login-btn" class="auth-btn">Войти</button>
                <button id="yandex-login-btn" class="auth-btn yandex">Войти через Яндекс</button>
            </div>
            
            <div id="register-form" class="auth-form">
                <input type="email" id="reg-email" placeholder="Email" class="auth-input">
                <input type="password" id="reg-password" placeholder="Пароль" class="auth-input">
                <button id="register-btn" class="auth-btn">Зарегистрироваться</button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ЗАВЕРШЕНИЯ РЕГИСТРАЦИИ -->
    <div id="complete-reg-screen" class="screen" style="display: none;">
        <div class="auth-container">
            <h2>Завершите регистрацию</h2>
            <input type="text" id="complete-name" placeholder="Имя" class="auth-input">
            <input type="text" id="complete-lastname" placeholder="Фамилия" class="auth-input">
            <input type="text" id="complete-username" placeholder="Юзернейм (уникальный)" class="auth-input">
            <select id="complete-country" class="auth-input">
                <option value="">Загрузка стран...</option>
            </select>
            <button id="complete-btn" class="auth-btn">Готово</button>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС МЕССЕНДЖЕРА -->
    <div id="main-screen" class="screen" style="display: none;">
        <div class="main-container">
            <div class="sidebar">
                <div class="sidebar-header">
                    <div class="user-info" id="sidebar-user-info">
                        <div class="avatar-small" id="sidebar-avatar">👤</div>
                        <div>
                            <div id="sidebar-name"></div>
                            <div id="sidebar-username" class="username-small"></div>
                        </div>
                    </div>
                </div>
                
                <div class="chats-list" id="chats-list">
                    <div class="chat-item" data-chat-id="favorites">
                        <span class="chat-icon">⭐</span>
                        <span class="chat-name">Избранное</span>
                    </div>
                </div>
                
                <div class="sidebar-bottom">
                    <button id="new-chat-btn" class="bottom-btn">➕</button>
                    <button id="notifications-btn" class="bottom-btn">🔔</button>
                    <button id="profile-btn" class="bottom-btn">⚙️</button>
                </div>
            </div>
            
            <div class="chat-area">
                <div class="chat-header" id="chat-header">
                    <div class="avatar-small" id="chat-avatar">💬</div>
                    <div>
                        <div id="chat-name"></div>
                        <div id="chat-type" class="chat-type-small"></div>
                    </div>
                    <button id="chat-info-btn" class="info-btn">ℹ️</button>
                </div>
                
                <div class="messages-area" id="messages-area">
                    <div class="messages" id="messages"></div>
                </div>
                
                <div class="message-input-area">
                    <input type="text" id="message-input" placeholder="Сообщение..." class="message-input">
                    <button id="send-btn" class="send-btn">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНЫЕ ОКНА -->
    <div id="new-chat-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Новый чат</h3>
            <button id="create-channel-btn" class="modal-btn">📢 Создать канал</button>
            <button id="create-group-btn" class="modal-btn">👥 Создать группу</button>
            <button id="new-private-chat-btn" class="modal-btn">💬 Личный чат</button>
            <hr>
            <h4>Все пользователи:</h4>
            <div id="users-list" class="users-list">Загрузка...</div>
        </div>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Мой профиль</h3>
            <div class="profile-info">
                <p><strong>ID:</strong> <span id="profile-id"></span> <button id="copy-id-btn" class="small-btn">📋 Копировать</button></p>
            </div>
            <input type="text" id="edit-name" placeholder="Имя" class="modal-input">
            <input type="text" id="edit-lastname" placeholder="Фамилия" class="modal-input">
            <input type="text" id="edit-username" placeholder="Юзернейм" class="modal-input">
            <select id="edit-country" class="modal-input">
                <option value="">Выберите страну</option>
            </select>
            <button id="save-profile-btn" class="modal-btn">Сохранить</button>
            <hr>
            <button id="delete-account-btn" class="modal-btn danger">🗑️ Удалить аккаунт</button>
            <button id="logout-btn" class="modal-btn">🚪 Выйти</button>
        </div>
    </div>

    <div id="notifications-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Приглашения</h3>
            <div id="invites-list" class="invites-list">Загрузка...</div>
        </div>
    </div>

    <div id="chat-info-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Информация о чате</h3>
            <div id="chat-info-content"></div>
            <button id="leave-chat-btn" class="modal-btn danger">Выйти из чата</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://functions.yandexcloud.net/d4e5vl94t494a4dim64t';
        let currentUser = null;
        let currentChat = { id: 'favorites', name: 'Избранное', type: 'personal' };
        let allUsers = [];
        let chats = [{ id: 'favorites', name: 'Избранное', type: 'personal' }];
        let refreshInterval = null;

        async function apiRequest(endpoint, method, data = null) {
            const options = {
                method,
                headers: { 'Content-Type': 'application/json' }
            };
            if (currentUser?.token) {
                options.headers['Authorization'] = `Bearer ${currentUser.token}`;
            }
            if (data) options.body = JSON.stringify(data);
            const response = await fetch(`${API_URL}${endpoint}`, options);
            const result = await response.json();
            if (!response.ok) throw new Error(result.error || 'Request failed');
            return result;
        }

        async function register() {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            if (!email || !password) { alert('Заполните все поля'); return; }
            try {
                const result = await apiRequest('/api/register', 'POST', { email, password });
                if (result.userId) {
                    window.tempUserId = result.userId;
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('complete-reg-screen').style.display = 'flex';
                    loadCountriesForSelect('complete-country');
                }
            } catch (error) { alert(error.message); }
        }

        async function completeRegistration() {
            const name = document.getElementById('complete-name').value;
            const lastname = document.getElementById('complete-lastname').value;
            const username = document.getElementById('complete-username').value;
            const country = document.getElementById('complete-country').value;
            if (!name || !lastname || !username || !country) { alert('Заполните все поля'); return; }
            try {
                const result = await apiRequest('/api/complete-registration', 'POST', {
                    userId: window.tempUserId, name, lastname, username, country
                });
                currentUser = { ...result.user, token: result.token };
                localStorage.setItem('wrgram_user', JSON.stringify(currentUser));
                document.getElementById('complete-reg-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'flex';
                initMainScreen();
            } catch (error) { alert(error.message); }
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                const result = await apiRequest('/api/login', 'POST', { email, password });
                currentUser = { ...result.user, token: result.token };
                localStorage.setItem('wrgram_user', JSON.stringify(currentUser));
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'flex';
                initMainScreen();
            } catch (error) { alert(error.message); }
        }

        function yandexLogin() {
            alert('Настройте Яндекс OAuth в коде (нужен Client ID)');
        }

        async function loadCountriesForSelect(elementId) {
            try {
                const response = await fetch('https://restcountries.com/v3.1/all');
                const countries = await response.json();
                const forbidden = ['Iran', 'Israel', 'Иран', 'Израиль'];
                const select = document.getElementById(elementId);
                select.innerHTML = '<option value="">Выберите страну</option>';
                countries.filter(c => !forbidden.includes(c.name.common))
                    .sort((a,b) => a.name.common.localeCompare(b.name.common))
                    .forEach(c => {
                        select.innerHTML += `<option value="${c.name.common}">${c.name.common}</option>`;
                    });
            } catch(e) { console.error(e); }
        }

        async function initMainScreen() {
            document.getElementById('sidebar-name').innerText = `${currentUser.name || ''} ${currentUser.lastname || ''}`;
            document.getElementById('sidebar-username').innerText = `@${currentUser.username || 'no_username'}`;
            await loadChats();
            await loadUsers();
            startMessagePolling();
            
            document.getElementById('new-chat-btn').onclick = () => document.getElementById('new-chat-modal').style.display = 'block';
            document.getElementById('notifications-btn').onclick = () => { loadInvites(); document.getElementById('notifications-modal').style.display = 'block'; };
            document.getElementById('profile-btn').onclick = () => { openProfile(); document.getElementById('profile-modal').style.display = 'block'; };
            document.getElementById('send-btn').onclick = sendMessage;
            document.getElementById('message-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
            document.getElementById('chat-info-btn').onclick = openChatInfo;
            
            document.querySelectorAll('.close').forEach(close => {
                close.onclick = () => close.closest('.modal').style.display = 'none';
            });
            
            document.getElementById('save-profile-btn').onclick = saveProfile;
            document.getElementById('delete-account-btn').onclick = deleteAccount;
            document.getElementById('logout-btn').onclick = logout;
            document.getElementById('copy-id-btn').onclick = () => copyToClipboard(currentUser.id);
            document.getElementById('create-channel-btn').onclick = () => createChat('channel');
            document.getElementById('create-group-btn').onclick = () => createChat('group');
            document.getElementById('new-private-chat-btn').onclick = () => document.getElementById('users-list').scrollIntoView();
            
            loadCountriesForSelect('edit-country');
            if (currentChat.id === 'favorites') openChat('favorites', 'Избранное', 'personal');
        }

        async function loadChats() {
            try {
                const serverChats = await apiRequest('/api/chats', 'GET');
                chats = [{ id: 'favorites', name: 'Избранное', type: 'personal' }, ...serverChats];
                renderChats();
            } catch (error) { console.error(error); }
        }

        function renderChats() {
            const container = document.getElementById('chats-list');
            container.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${currentChat?.id === chat.id ? 'active' : ''}`;
                div.innerHTML = `<span class="chat-icon">${chat.type === 'group' ? '👥' : chat.type === 'channel' ? '📢' : '💬'}</span>
                                 <span class="chat-name">${chat.name || 'Без названия'}</span>`;
                div.onclick = () => openChat(chat.id, chat.name, chat.type);
                container.appendChild(div);
            });
        }

        async function openChat(chatId, chatName, chatType) {
            currentChat = { id: chatId, name: chatName, type: chatType };
            document.getElementById('chat-name').innerText = chatName || 'Чат';
            document.getElementById('chat-type').innerText = chatType === 'group' ? 'Группа' : chatType === 'channel' ? 'Канал' : 'Личный чат';
            renderChats();
            await loadMessages();
        }

        async function loadMessages() {
            if (!currentChat.id) return;
            try {
                let messages = [];
                if (currentChat.id === 'favorites') {
                    messages = JSON.parse(localStorage.getItem('favorites') || '[]');
                } else {
                    messages = await apiRequest(`/api/messages/${currentChat.id}`, 'GET');
                }
                const container = document.getElementById('messages');
                container.innerHTML = '';
                messages.forEach(msg => {
                    const isOwn = msg.from_user === currentUser.id;
                    const div = document.createElement('div');
                    div.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
                    div.innerHTML = `<div class="message-info">${!isOwn ? (msg.name || 'Unknown') + ' ' + (msg.lastname || '') : ''} ${msg.created_at ? new Date(msg.created_at).toLocaleTimeString() : ''}</div>
                                     <div class="message-text">${escapeHtml(msg.content)}</div>`;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            } catch (error) { console.error(error); }
        }

        function escapeHtml(text) { return text.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

        async function sendMessage() {
            const text = document.getElementById('message-input').value;
            if (!text.trim()) return;
            try {
                if (currentChat.id === 'favorites') {
                    const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
                    favorites.push({ id: Date.now(), from_user: currentUser.id, content: text, created_at: new Date().toISOString() });
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                } else {
                    await apiRequest('/api/message', 'POST', { chatId: currentChat.id, text: text });
                }
                document.getElementById('message-input').value = '';
                await loadMessages();
            } catch (error) { alert('Ошибка отправки: ' + error.message); }
        }

        async function loadUsers() {
            try {
                allUsers = await apiRequest('/api/users', 'GET');
                const container = document.getElementById('users-list');
                container.innerHTML = '';
                allUsers.forEach(user => {
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.innerHTML = `<div><strong>${user.name || ''} ${user.lastname || ''}</strong> ${user.username ? `(@${user.username})` : ''} ${user.is_verified ? ' ✅' : ''}</div>
                                     <button class="small-btn" onclick="startPrivateChat('${user.id}')">Чат</button>`;
                    container.appendChild(div);
                });
            } catch (error) { console.error(error); }
        }

        window.startPrivateChat = async function(userId) {
            try {
                await apiRequest('/api/chat', 'POST', { type: 'personal', name: null, members: [userId] });
                await loadChats();
                document.getElementById('new-chat-modal').style.display = 'none';
            } catch (error) { alert('Ошибка: ' + error.message); }
        }

        async function createChat(type) {
            const name = prompt('Введите название ' + (type === 'channel' ? 'канала' : 'группы'));
            if (!name) return;
            let members = [];
            if (type === 'group') {
                const userIds = prompt('Введите ID пользователей через запятую');
                if (userIds) members = userIds.split(',').map(s => s.trim());
            }
            try {
                await apiRequest('/api/chat', 'POST', { type, name, members });
                await loadChats();
                document.getElementById('new-chat-modal').style.display = 'none';
                alert('Чат создан!');
            } catch (error) { alert('Ошибка: ' + error.message); }
        }

        async function loadInvites() {
            try {
                const invites = await apiRequest('/api/invites', 'GET');
                const container = document.getElementById('invites-list');
                container.innerHTML = '';
                if (invites.length === 0) { container.innerHTML = '<p>Нет приглашений</p>'; return; }
                invites.forEach(invite => {
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.innerHTML = `<div><strong>${invite.name || ''} ${invite.lastname || ''}</strong> пригласил(а) вас в чат</div>
                                     <div><button class="small-btn" onclick="respondToInvite('${invite.id}', true)">✅</button>
                                     <button class="small-btn" onclick="respondToInvite('${invite.id}', false)">❌</button></div>`;
                    container.appendChild(div);
                });
            } catch (error) { console.error(error); }
        }

        window.respondToInvite = async function(inviteId, accept) {
            try {
                await apiRequest('/api/invite/respond', 'POST', { inviteId, accept });
                await loadChats();
                loadInvites();
            } catch (error) { alert('Ошибка: ' + error.message); }
        }

        function openProfile() {
            document.getElementById('profile-id').innerText = currentUser.id;
            document.getElementById('edit-name').value = currentUser.name || '';
            document.getElementById('edit-lastname').value = currentUser.lastname || '';
            document.getElementById('edit-username').value = currentUser.username || '';
            if (currentUser.country) document.getElementById('edit-country').value = currentUser.country;
        }

        async function saveProfile() {
            const name = document.getElementById('edit-name').value;
            const lastname = document.getElementById('edit-lastname').value;
            const username = document.getElementById('edit-username').value;
            const country = document.getElementById('edit-country').value;
            try {
                await apiRequest('/api/profile', 'PUT', { name, lastname, username, country });
                currentUser.name = name; currentUser.lastname = lastname; currentUser.username = username; currentUser.country = country;
                localStorage.setItem('wrgram_user', JSON.stringify(currentUser));
                document.getElementById('sidebar-name').innerText = `${name} ${lastname}`;
                document.getElementById('sidebar-username').innerText = `@${username}`;
                alert('Профиль обновлён!');
                document.getElementById('profile-modal').style.display = 'none';
            } catch (error) { alert('Ошибка: ' + error.message); }
        }

        async function deleteAccount() {
            if (!confirm('Вы уверены? Аккаунт будет удалён навсегда!')) return;
            try {
                await apiRequest('/api/delete-account', 'DELETE');
                localStorage.removeItem('wrgram_user');
                location.reload();
            } catch (error) { alert('Ошибка: ' + error.message); }
        }

        function logout() {
            localStorage.removeItem('wrgram_user');
            location.reload();
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert('ID скопирован!');
        }

        async function openChatInfo() {
            if (currentChat.id === 'favorites') {
                alert('Избранное — ваш личный чат для заметок');
                return;
            }
            document.getElementById('chat-info-modal').style.display = 'block';
            document.getElementById('chat-info-content').innerHTML = `<p>Чат: ${currentChat.name}</p><p>ID: ${currentChat.id}</p>`;
            document.getElementById('leave-chat-btn').onclick = leaveChat;
        }

        async function leaveChat() {
            if (confirm('Выйти из чата?')) {
                // Здесь можно добавить API для выхода
                document.getElementById('chat-info-modal').style.display = 'none';
                await loadChats();
            }
        }

        function startMessagePolling() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => { if (currentChat && currentChat.id !== 'favorites') loadMessages(); }, 3000);
        }

        // АВТОРИЗАЦИЯ ПРИ ЗАГРУЗКЕ
        (function() {
            const saved = localStorage.getItem('wrgram_user');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('main-screen').style.display = 'flex';
                    initMainScreen();
                } catch(e) { console.error(e); }
            }
        })();

        document.getElementById('register-btn').onclick = register;
        document.getElementById('login-btn').onclick = login;
        document.getElementById('yandex-login-btn').onclick = yandexLogin;
        document.getElementById('complete-btn').onclick = completeRegistration;
        
        // Переключение табов
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                document.getElementById(`${tab.dataset.tab}-form`).classList.add('active');
            };
        });
    </script>
</body>
</html>
