<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WR GRAM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }
        .screen { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .auth-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .auth-container h1 { margin-bottom: 20px; color: #667eea; font-size: 32px; }
        .auth-container h2 { margin-bottom: 25px; color: #333; font-size: 18px; font-weight: normal; }
        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }
        .auth-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .auth-btn.google {
            background: #4285f4;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .auth-btn.google:before {
            content: "G";
            background: white;
            color: #4285f4;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .auth-btn:hover { opacity: 0.9; }
        .main-container { display: flex; width: 100vw; height: 100vh; background: white; }
        .sidebar {
            width: 320px;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        @media (max-width: 768px) { .sidebar { width: 80px; } .chat-name, .sidebar .user-info div:not(.avatar-small) { display: none; } }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #e0e0e0; }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-item:hover { background: #e9ecef; }
        .chat-item.active { background: #e3f2fd; }
        .sidebar-bottom {
            padding: 15px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-around;
        }
        .bottom-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: #667eea;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; gap: 12px; background: white; }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; }
        .messages { display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 18px; }
        .message-own { align-self: flex-end; background: #667eea; color: white; }
        .message-other { align-self: flex-start; background: #f1f3f5; }
        .message-info { font-size: 11px; margin-bottom: 4px; opacity: 0.7; }
        .message-text { word-wrap: break-word; }
        .message-input-area { padding: 15px 20px; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; }
        .message-input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        .send-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #667eea; color: white; font-size: 20px; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 50px auto; padding: 30px; width: 500px; max-width: 90%; max-height: 80vh; overflow-y: auto; border-radius: 20px; position: relative; }
        .close { position: absolute; right: 20px; top: 20px; font-size: 28px; cursor: pointer; }
        .small-btn { padding: 5px 10px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .user-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .avatar-small { width: 40px; height: 40px; border-radius: 50%; background: #667eea; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .profile-info { margin: 15px 0; padding: 10px; background: #f5f5f5; border-radius: 10px; }
        .profile-info code { word-break: break-all; font-size: 12px; }
        hr { margin: 15px 0; }
        .username-small { font-size: 12px; color: #6c757d; }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div id="auth-screen" class="screen">
        <div class="auth-container">
            <h1>✨ WR GRAM</h1>
            <h2>Войдите через Google</h2>
            <div id="g_id_onload"
                 data-client_id="727787416139-otser0351cpqlfsj96cl8r1j5t65grur.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleGoogleLogin"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
            <div style="margin-top: 20px; font-size: 12px; color: #666;">Нажимая кнопку, вы принимаете условия использования</div>
        </div>
    </div>

    <div id="complete-reg-screen" class="screen" style="display: none;">
        <div class="auth-container">
            <h2>Добро пожаловать! 👋</h2>
            <p>Завершите создание профиля</p>
            <input type="text" id="complete-name" placeholder="Имя" class="auth-input">
            <input type="text" id="complete-lastname" placeholder="Фамилия" class="auth-input">
            <input type="text" id="complete-username" placeholder="Юзернейм (уникальный)" class="auth-input">
            <select id="complete-country" class="auth-input">
                <option value="">Выберите страну</option>
                <option>Россия</option><option>США</option><option>Германия</option><option>Франция</option>
                <option>Великобритания</option><option>Канада</option><option>Япония</option><option>Китай</option>
                <option>Индия</option><option>Бразилия</option><option>Австралия</option><option>Италия</option>
                <option>Испания</option><option>Украина</option><option>Беларусь</option><option>Казахстан</option>
            </select>
            <button id="complete-btn" class="auth-btn">Начать общение →</button>
        </div>
    </div>

    <div id="main-screen" class="screen" style="display: none;">
        <div class="main-container">
            <div class="sidebar">
                <div class="sidebar-header">
                    <div id="sidebar-name" style="font-weight: bold;"></div>
                    <div id="sidebar-username" class="username-small"></div>
                </div>
                <div class="chats-list" id="chats-list">
                    <div class="chat-item" onclick="openChat('favorites', 'Избранное')">
                        <span>⭐</span><span class="chat-name">Избранное</span>
                    </div>
                </div>
                <div class="sidebar-bottom">
                    <button class="bottom-btn" id="new-chat-btn">➕</button>
                    <button class="bottom-btn" id="notifications-btn">🔔</button>
                    <button class="bottom-btn" id="profile-btn">⚙️</button>
                </div>
            </div>
            <div class="chat-area">
                <div class="chat-header">
                    <div class="avatar-small">💬</div>
                    <div><div id="chat-name">Избранное</div></div>
                </div>
                <div class="messages-area"><div class="messages" id="messages"></div></div>
                <div class="message-input-area">
                    <input type="text" id="message-input" placeholder="Сообщение..." class="message-input">
                    <button id="send-btn" class="send-btn">➤</button>
                </div>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="modal"><div class="modal-content"><span class="close">&times;</span><h3>👤 Мой профиль</h3>
        <div class="profile-info"><strong>Ваш ID:</strong><br><code id="profile-id"></code><button id="copy-id-btn" class="small-btn" style="margin-left: 10px;">📋</button></div>
        <input id="edit-name" placeholder="Имя" class="auth-input">
        <input id="edit-lastname" placeholder="Фамилия" class="auth-input">
        <input id="edit-username" placeholder="Юзернейм" class="auth-input">
        <select id="edit-country" class="auth-input"><option>Россия</option><option>США</option><option>Германия</option><option>Франция</option></select>
        <button id="save-profile-btn" class="auth-btn">💾 Сохранить</button><hr>
        <button id="logout-btn" class="auth-btn">🚪 Выйти</button>
        <button id="delete-account-btn" class="auth-btn" style="background:#dc3545;">🗑️ Удалить аккаунт</button>
    </div></div>

    <div id="new-chat-modal" class="modal"><div class="modal-content"><span class="close">&times;</span><h3>➕ Новый чат</h3>
        <button id="create-group-btn" class="auth-btn">👥 Создать группу</button>
        <div style="margin: 15px 0; font-weight: bold;">Все пользователи:</div>
        <div id="users-list" style="max-height: 300px; overflow-y: auto;"></div>
    </div></div>

    <div id="notifications-modal" class="modal"><div class="modal-content"><span class="close">&times;</span><h3>🔔 Приглашения</h3><div id="invites-list">Нет приглашений</div></div></div>

    <script>
        // ⚠️ ЗАМЕНИТЕ ЭТОТ URL НА ВАШ НОВЫЙ URL ФУНКЦИИ ⚠️
        const API_URL = 'https://wrgram-new.yurashiry.workers.dev/'
        let currentUser = null;
        let currentChat = { id: 'favorites', name: 'Избранное' };
        let refreshInterval = null;

        async function apiRequest(endpoint, method, data = null) {
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (data) options.body = JSON.stringify(data);
            const response = await fetch(`${API_URL}${endpoint}`, options);
            const result = await response.json();
            if (!response.ok) throw new Error(result.error || 'Request failed');
            return result;
        }

        window.handleGoogleLogin = async (response) => {
            try {
                const result = await apiRequest('/api/google-login', 'POST', { credential: response.credential });
                if (result.user) {
                    currentUser = result.user;
                    localStorage.setItem('wrgram_user', JSON.stringify(currentUser));
                    if (!currentUser.name || !currentUser.username) {
                        document.getElementById('auth-screen').style.display = 'none';
                        document.getElementById('complete-reg-screen').style.display = 'flex';
                    } else {
                        document.getElementById('auth-screen').style.display = 'none';
                        document.getElementById('main-screen').style.display = 'flex';
                        initMainScreen();
                    }
                }
            } catch (error) {
                alert('Ошибка входа: ' + error.message);
            }
        };

        async function completeRegistration() {
            const name = document.getElementById('complete-name').value;
            const lastname = document.getElementById('complete-lastname').value;
            const username = document.getElementById('complete-username').value;
            const country = document.getElementById('complete-country').value;
            if (!name || !lastname || !username || !country) { alert('Заполните все поля'); return; }
            try {
                const result = await apiRequest('/api/complete-registration', 'POST', {
                    userId: currentUser.id, name, lastname, username, country
                });
                currentUser = result.user;
                localStorage.setItem('wrgram_user', JSON.stringify(currentUser));
                document.getElementById('complete-reg-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'flex';
                initMainScreen();
            } catch(error) { alert(error.message); }
        }

        async function initMainScreen() {
            document.getElementById('sidebar-name').innerText = `${currentUser.name || ''} ${currentUser.lastname || ''}`;
            document.getElementById('sidebar-username').innerText = `@${currentUser.username || 'no_username'}`;
            await loadUsers();
            await loadChats();
            startPolling();
            
            document.getElementById('new-chat-btn').onclick = () => document.getElementById('new-chat-modal').style.display = 'block';
            document.getElementById('notifications-btn').onclick = () => document.getElementById('notifications-modal').style.display = 'block';
            document.getElementById('profile-btn').onclick = () => { openProfile(); document.getElementById('profile-modal').style.display = 'block'; };
            document.getElementById('send-btn').onclick = sendMessage;
            document.getElementById('message-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
            document.querySelectorAll('.close').forEach(close => close.onclick = () => close.closest('.modal').style.display = 'none');
            document.getElementById('save-profile-btn').onclick = saveProfile;
            document.getElementById('logout-btn').onclick = logout;
            document.getElementById('delete-account-btn').onclick = deleteAccount;
            document.getElementById('copy-id-btn').onclick = () => navigator.clipboard.writeText(currentUser.id);
            document.getElementById('create-group-btn').onclick = createGroup;
            
            openChat('favorites', 'Избранное');
        }

        async function loadUsers() {
            try {
                const users = await apiRequest('/api/users', 'GET');
                const container = document.getElementById('users-list');
                container.innerHTML = '';
                users.forEach(user => {
                    if (user.id === currentUser?.id) return;
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.innerHTML = `<span><b>${user.name || ''} ${user.lastname || ''}</b> @${user.username || ''}</span>
                                     <button class="small-btn" onclick="startChat('${user.id}')">💬 Чат</button>`;
                    container.appendChild(div);
                });
            } catch(error) { console.error(error); }
        }

        async function loadChats() {
            try {
                const chats = await apiRequest('/api/chats', 'POST', { userId: currentUser.id });
                const container = document.getElementById('chats-list');
                chats.forEach(chat => {
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.innerHTML = `<span>${chat.type === 'group' ? '👥' : '💬'}</span><span class="chat-name">${chat.name || 'Чат'}</span>`;
                    div.onclick = () => openChat(chat.id, chat.name);
                    container.appendChild(div);
                });
            } catch(error) { console.error(error); }
        }

        window.startChat = async function(userId) {
            try {
                const result = await apiRequest('/api/chat', 'POST', { userId: currentUser.id, type: 'personal', members: [userId] });
                await loadChats();
                document.getElementById('new-chat-modal').style.display = 'none';
                openChat(result.chatId, 'Чат');
            } catch(error) { alert('Ошибка: ' + error.message); }
        }

        async function createGroup() {
            const name = prompt('Название группы:');
            if (!name) return;
            const members = prompt('ID участников через запятую:');
            const memberIds = members ? members.split(',').map(m => m.trim()) : [];
            await apiRequest('/api/chat', 'POST', { userId: currentUser.id, type: 'group', name, members: memberIds });
            await loadChats();
            document.getElementById('new-chat-modal').style.display = 'none';
            alert('Группа создана!');
        }

        async function openChat(chatId, chatName) {
            currentChat = { id: chatId, name: chatName };
            document.getElementById('chat-name').innerText = chatName;
            await loadMessages();
        }

        async function loadMessages() {
            if (currentChat.id === 'favorites') {
                const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
                renderMessages(favorites);
                return;
            }
            try {
                const messages = await apiRequest(`/api/messages/${currentChat.id}`, 'GET');
                renderMessages(messages);
            } catch(error) { console.error(error); }
        }

        function renderMessages(messages) {
            const container = document.getElementById('messages');
            container.innerHTML = '';
            messages.forEach(msg => {
                const isOwn = msg.from_user === currentUser.id;
                const div = document.createElement('div');
                div.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
                const sender = !isOwn && msg.name ? `<div class="message-info">${msg.name}</div>` : '';
                div.innerHTML = `${sender}<div class="message-text">${escapeHtml(msg.content || msg.text || '')}</div>`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) { if (!text) return ''; return text.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

        async function sendMessage() {
            const text = document.getElementById('message-input').value;
            if (!text.trim()) return;
            if (currentChat.id === 'favorites') {
                const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
                favorites.push({ id: Date.now(), from_user: currentUser.id, content: text, created_at: new Date().toISOString() });
                localStorage.setItem('favorites', JSON.stringify(favorites));
                document.getElementById('message-input').value = '';
                await loadMessages();
                return;
            }
            try {
                await apiRequest('/api/message', 'POST', { userId: currentUser.id, chatId: currentChat.id, text });
                document.getElementById('message-input').value = '';
                await loadMessages();
            } catch(error) { alert('Ошибка: ' + error.message); }
        }

        function openProfile() {
            document.getElementById('profile-id').innerText = currentUser.id;
            document.getElementById('edit-name').value = currentUser.name || '';
            document.getElementById('edit-lastname').value = currentUser.lastname || '';
            document.getElementById('edit-username').value = currentUser.username || '';
        }

        async function saveProfile() {
            const name = document.getElementById('edit-name').value;
            const lastname = document.getElementById('edit-lastname').value;
            const username = document.getElementById('edit-username').value;
            const country = document.getElementById('edit-country').value;
            if (!name || !lastname || !username || !country) { alert('Заполните все поля'); return; }
            try {
                await apiRequest('/api/profile', 'PUT', { userId: currentUser.id, name, lastname, username, country });
                currentUser.name = name; currentUser.lastname = lastname; currentUser.username = username; currentUser.country = country;
                localStorage.setItem('wrgram_user', JSON.stringify(currentUser));
                document.getElementById('sidebar-name').innerText = `${name} ${lastname}`;
                document.getElementById('sidebar-username').innerText = `@${username}`;
                alert('Профиль обновлён!');
                document.getElementById('profile-modal').style.display = 'none';
            } catch(error) { alert('Ошибка: ' + error.message); }
        }

        async function deleteAccount() {
            if (!confirm('Удалить аккаунт навсегда?')) return;
            try {
                await apiRequest('/api/delete-account', 'DELETE', { userId: currentUser.id });
                localStorage.removeItem('wrgram_user');
                location.reload();
            } catch(error) { alert('Ошибка: ' + error.message); }
        }

        function logout() { localStorage.removeItem('wrgram_user'); location.reload(); }
        function startPolling() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => { if (currentChat && currentChat.id !== 'favorites') loadMessages(); }, 3000);
        }

        const saved = localStorage.getItem('wrgram_user');
        if (saved) {
            currentUser = JSON.parse(saved);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
            initMainScreen();
        }

        document.getElementById('complete-btn').onclick = completeRegistration;
    </script>
</body>
</html>
