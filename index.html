<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WR GRAM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #fff;
            height: 100vh;
            overflow: hidden;
        }

        /* Экран авторизации */
        .auth-screen {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 48px 32px;
            width: 380px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .auth-card h1 {
            font-size: 44px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-card p {
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }

        /* Основной интерфейс */
        .main-container {
            display: flex;
            height: 100vh;
            background: #fff;
        }

        /* Боковая панель */
        .sidebar {
            width: 320px;
            background: #f5f5f5;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: fixed;
                left: -100%;
                transition: left 0.3s ease;
                z-index: 100;
                background: #f5f5f5;
            }
            .sidebar.open {
                left: 0;
            }
            .chat-area {
                width: 100%;
            }
            .mobile-back {
                display: block;
            }
            .sidebar-header {
                padding: 16px !important;
            }
            .settings-btn {
                display: block !important;
            }
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            font-size: 22px;
            font-weight: 600;
            color: #333;
        }

        .settings-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #e0e0e0;
            border: none;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .settings-btn:hover {
            background: #d0d0d0;
        }

        /* Список чатов */
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: #ececec;
        }

        .chat-item.active {
            background: #e3f2fd;
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            font-size: 16px;
            color: #333;
        }

        .chat-preview {
            font-size: 13px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 4px;
        }

        /* Нижняя панель с кнопками */
        .sidebar-bottom {
            padding: 16px 20px;
            border-top: 1px solid #e5e5e5;
            display: flex;
            gap: 16px;
        }

        .fab-btn {
            flex: 1;
            height: 52px;
            border-radius: 26px;
            border: none;
            background: #667eea;
            color: white;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s, background 0.2s;
        }

        .fab-btn:active {
            transform: scale(0.97);
        }

        /* Область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            height: 100%;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            gap: 16px;
            background: #fff;
        }

        .mobile-back {
            display: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f0f0f0;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        .chat-header-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            flex-shrink: 0;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-weight: 600;
            font-size: 18px;
            color: #333;
        }

        .chat-header-status {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .messages {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            font-size: 15px;
        }

        .message-own {
            align-self: flex-end;
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-other {
            align-self: flex-start;
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message-input-area {
            padding: 16px 24px;
            border-top: 1px solid #e5e5e5;
            display: flex;
            gap: 12px;
            background: #fff;
        }

        .message-input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #e5e5e5;
            border-radius: 28px;
            outline: none;
            font-size: 15px;
            background: #f8f8f8;
        }

        .message-input:focus {
            border-color: #667eea;
            background: #fff;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: #667eea;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .empty-chat {
            text-align: center;
            color: #aaa;
            margin-top: 40vh;
            font-size: 16px;
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            margin: 15vh auto;
            padding: 28px;
            width: 420px;
            max-width: 90%;
            max-height: 70vh;
            overflow-y: auto;
            border-radius: 28px;
            position: relative;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close:hover {
            color: #333;
        }

        .modal-input {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            font-size: 15px;
        }

        .modal-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 12px;
            font-weight: 500;
        }

        .modal-btn.danger {
            background: #dc3545;
        }

        .profile-info {
            margin: 16px 0;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 12px;
        }

        .profile-info code {
            word-break: break-all;
            font-size: 12px;
        }

        hr {
            margin: 16px 0;
            border: none;
            border-top: 1px solid #e5e5e5;
        }

        .user-item {
            padding: 12px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .small-btn {
            padding: 6px 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        .avatar-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <!-- АВТОРИЗАЦИЯ -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-card">
            <h1>WR GRAM</h1>
            <p>Войдите, чтобы продолжить</p>
            <div id="g_id_onload"
                 data-client_id="727787416139-otser0351cpqlfsj96cl8r1j5t65grur.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleGoogleLogin"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
        </div>
    </div>

    <!-- ЗАВЕРШЕНИЕ РЕГИСТРАЦИИ -->
    <div id="complete-screen" style="display: none;">
        <div class="auth-card" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
            <h2 style="margin-bottom: 24px;">✨ Завершите профиль</h2>
            <input type="text" id="complete-name" placeholder="Имя" class="modal-input">
            <input type="text" id="complete-lastname" placeholder="Фамилия" class="modal-input">
            <input type="text" id="complete-username" placeholder="Юзернейм" class="modal-input">
            <select id="complete-country" class="modal-input">
                <option>Россия</option><option>США</option><option>Германия</option><option>Франция</option>
            </select>
            <button id="complete-btn" class="modal-btn">Продолжить →</button>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="main-screen" style="display: none;">
        <div class="main-container">
            <!-- Боковая панель (список чатов) -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2>Чаты</h2>
                    <button class="settings-btn" id="settings-btn">⚙️</button>
                </div>
                <div class="chats-list" id="chats-list">
                    <div style="padding: 20px; text-align: center; color: #aaa;">Загрузка...</div>
                </div>
                <div class="sidebar-bottom">
                    <button class="fab-btn" id="new-chat-btn">➕ Новый чат</button>
                </div>
            </div>

            <!-- Область чата -->
            <div class="chat-area" id="chat-area">
                <div class="chat-header">
                    <button class="mobile-back" id="mobile-back">←</button>
                    <div class="chat-header-avatar" id="chat-header-avatar">💬</div>
                    <div class="chat-header-info">
                        <div class="chat-header-name" id="chat-header-name">Выберите чат</div>
                        <div class="chat-header-status" id="chat-header-status"></div>
                    </div>
                </div>
                <div class="messages-area" id="messages-area">
                    <div class="empty-chat" id="empty-chat">
                        ✨ Начните общение<br>выберите чат из списка
                    </div>
                    <div class="messages" id="messages" style="display: none;"></div>
                </div>
                <div class="message-input-area" id="message-input-area" style="display: none;">
                    <input type="text" id="message-input" placeholder="Сообщение..." class="message-input">
                    <button id="send-btn" class="send-btn">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКИ -->
    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Профиль</h3>
            <div class="profile-info">
                <strong>ID:</strong><br>
                <code id="profile-id"></code>
                <button id="copy-id-btn" class="small-btn" style="margin-left: 8px;">📋</button>
            </div>
            <input id="edit-name" placeholder="Имя" class="modal-input">
            <input id="edit-lastname" placeholder="Фамилия" class="modal-input">
            <input id="edit-username" placeholder="Юзернейм" class="modal-input">
            <select id="edit-country" class="modal-input">
                <option>Россия</option><option>США</option><option>Германия</option>
            </select>
            <button id="save-profile-btn" class="modal-btn">Сохранить</button>
            <hr>
            <button id="logout-btn" class="modal-btn">Выйти</button>
            <button id="delete-account-btn" class="modal-btn danger">Удалить аккаунт</button>
        </div>
    </div>

    <div id="new-chat-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Новый чат</h3>
            <button id="create-group-btn" class="modal-btn">Создать группу</button>
            <div style="margin: 16px 0; font-weight: 500;">Все пользователи:</div>
            <div id="users-list" style="max-height: 300px; overflow-y: auto;"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://wrgram.yurashiry.workers.dev';
        let currentUser = null;
        let currentChat = null;
        let refreshInterval = null;

        async function apiRequest(endpoint, method, data = null) {
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (data) options.body = JSON.stringify(data);
            const response = await fetch(`${API_URL}${endpoint}`, options);
            const result = await response.json();
            if (!response.ok) throw new Error(result.error || 'Request failed');
            return result;
        }

        window.handleGoogleLogin = async (response) => {
            try {
                const result = await apiRequest('/api/google-login', 'POST', { credential: response.credential });
                if (result.user) {
                    currentUser = result.user;
                    if (!currentUser.name || !currentUser.username) {
                        document.getElementById('auth-screen').style.display = 'none';
                        document.getElementById('complete-screen').style.display = 'flex';
                    } else {
                        document.getElementById('auth-screen').style.display = 'none';
                        document.getElementById('main-screen').style.display = 'flex';
                        initMainScreen();
                    }
                }
            } catch (error) {
                alert('Ошибка входа: ' + error.message);
            }
        };

        async function completeRegistration() {
            const name = document.getElementById('complete-name').value;
            const lastname = document.getElementById('complete-lastname').value;
            const username = document.getElementById('complete-username').value;
            const country = document.getElementById('complete-country').value;
            if (!name || !lastname || !username || !country) { alert('Заполните все поля'); return; }
            try {
                const result = await apiRequest('/api/complete-registration', 'POST', {
                    userId: currentUser.id, name, lastname, username, country, avatar: currentUser.avatar
                });
                currentUser = { ...currentUser, ...result.user };
                document.getElementById('complete-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'flex';
                initMainScreen();
            } catch(error) { alert(error.message); }
        }

        async function initMainScreen() {
            await loadChats();
            startPolling();
            
            document.getElementById('settings-btn').onclick = () => { openProfile(); document.getElementById('profile-modal').style.display = 'block'; };
            document.getElementById('new-chat-btn').onclick = () => document.getElementById('new-chat-modal').style.display = 'block';
            document.getElementById('mobile-back').onclick = () => {
                document.getElementById('sidebar').classList.remove('open');
                currentChat = null;
                document.getElementById('chat-header-name').innerText = 'Выберите чат';
                document.getElementById('empty-chat').style.display = 'block';
                document.getElementById('messages').style.display = 'none';
                document.getElementById('message-input-area').style.display = 'none';
            };
            
            document.querySelectorAll('.close').forEach(close => close.onclick = () => close.closest('.modal').style.display = 'none');
            document.getElementById('save-profile-btn').onclick = saveProfile;
            document.getElementById('logout-btn').onclick = () => { location.reload(); };
            document.getElementById('delete-account-btn').onclick = deleteAccount;
            document.getElementById('copy-id-btn').onclick = () => navigator.clipboard.writeText(currentUser.id);
            document.getElementById('create-group-btn').onclick = createGroup;
            document.getElementById('send-btn').onclick = sendMessage;
            document.getElementById('message-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        }

        async function loadChats() {
            try {
                const chats = await apiRequest('/api/chats', 'POST', { userId: currentUser.id });
                const container = document.getElementById('chats-list');
                container.innerHTML = '';
                chats.forEach(chat => {
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    if (currentChat && currentChat.id === chat.id) div.classList.add('active');
                    div.innerHTML = `
                        <div class="chat-avatar">${chat.type === 'group' ? '👥' : '💬'}</div>
                        <div class="chat-info">
                            <div class="chat-name">${escapeHtml(chat.name)}</div>
                            <div class="chat-preview">Нажмите для открытия</div>
                        </div>
                    `;
                    div.onclick = () => openChat(chat.id, chat.name, chat.type);
                    container.appendChild(div);
                });
                if (chats.length === 0) {
                    container.innerHTML = '<div style="padding: 20px; text-align: center; color: #aaa;">Нет чатов</div>';
                }
            } catch(error) { console.error(error); }
        }

        async function openChat(chatId, chatName, chatType) {
            currentChat = { id: chatId, name: chatName, type: chatType };
            document.getElementById('chat-header-name').innerText = chatName;
            document.getElementById('chat-header-status').innerText = chatType === 'group' ? 'Группа' : 'Личный чат';
            document.getElementById('empty-chat').style.display = 'none';
            document.getElementById('messages').style.display = 'flex';
            document.getElementById('message-input-area').style.display = 'flex';
            
            // Для мобильных устройств открываем чат на весь экран
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('open');
            }
            
            await loadMessages();
        }

        async function loadMessages() {
            if (!currentChat) return;
            try {
                const messages = await apiRequest(`/api/messages/${currentChat.id}`, 'GET');
                const container = document.getElementById('messages');
                container.innerHTML = '';
                if (messages.length === 0) {
                    container.innerHTML = '<div style="text-align: center; color: #aaa; margin-top: 20px;">Нет сообщений</div>';
                }
                messages.forEach(msg => {
                    const isOwn = msg.from_user === currentUser.id;
                    const div = document.createElement('div');
                    div.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
                    div.innerHTML = `<div class="message-text">${escapeHtml(msg.content || msg.text || '')}</div>`;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            } catch(error) { console.error(error); }
        }

        async function sendMessage() {
            const text = document.getElementById('message-input').value;
            if (!text.trim() || !currentChat) return;
            document.getElementById('message-input').value = '';
            try {
                await apiRequest('/api/message', 'POST', { userId: currentUser.id, chatId: currentChat.id, text });
                await loadMessages();
            } catch(error) { alert('Ошибка: ' + error.message); }
        }

        async function createGroup() {
            const name = prompt('Название группы:');
            if (!name) return;
            await apiRequest('/api/chat', 'POST', { userId: currentUser.id, type: 'group', name, members: [] });
            await loadChats();
            document.getElementById('new-chat-modal').style.display = 'none';
        }

        function openProfile() {
            document.getElementById('profile-id').innerText = currentUser.id;
            document.getElementById('edit-name').value = currentUser.name || '';
            document.getElementById('edit-lastname').value = currentUser.lastname || '';
            document.getElementById('edit-username').value = currentUser.username || '';
        }

        async function saveProfile() {
            try {
                await apiRequest('/api/profile', 'PUT', {
                    userId: currentUser.id,
                    name: document.getElementById('edit-name').value,
                    lastname: document.getElementById('edit-lastname').value,
                    username: document.getElementById('edit-username').value,
                    country: document.getElementById('edit-country').value
                });
                currentUser.name = document.getElementById('edit-name').value;
                currentUser.lastname = document.getElementById('edit-lastname').value;
                currentUser.username = document.getElementById('edit-username').value;
                alert('Профиль обновлён');
                document.getElementById('profile-modal').style.display = 'none';
            } catch(error) { alert(error.message); }
        }

        async function deleteAccount() {
            if (!confirm('Удалить аккаунт навсегда?')) return;
            await apiRequest('/api/delete-account', 'DELETE', { userId: currentUser.id });
            location.reload();
        }

        function escapeHtml(text) { if (!text) return ''; return text.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        function startPolling() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => { if (currentChat) loadMessages(); }, 3000);
        }

        document.getElementById('complete-btn').onclick = completeRegistration;
    </script>
</body>
</html>
