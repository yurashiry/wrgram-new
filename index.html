<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WR GRAM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --bg-light: #f8f9fa;
            --border: #e0e0e0;
            --text: #333;
            --text-light: #6c757d;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }
        
        /* Экран авторизации */
        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .auth-container {
            background: white;
            border-radius: 28px;
            padding: 40px 32px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            text-align: center;
        }
        
        .auth-container h1 {
            margin-bottom: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 42px;
        }
        
        .auth-container h2 {
            margin-bottom: 32px;
            color: var(--text-light);
            font-size: 16px;
            font-weight: normal;
        }
        
        /* Основной интерфейс */
        .main-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: white;
        }
        
        /* Боковая панель */
        .sidebar {
            width: 280px;
            background: var(--bg-light);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }
            .chat-name, .sidebar .user-name, .sidebar .user-username {
                display: none;
            }
            .chat-item {
                justify-content: center;
                padding: 15px;
            }
            .sidebar-header {
                padding: 15px;
                justify-content: center;
            }
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        
        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }
        
        .avatar-small {
            width: 36px;
            height: 36px;
        }
        
        .user-info {
            flex: 1;
            overflow: hidden;
        }
        
        .user-name {
            font-weight: 600;
            color: var(--text);
        }
        
        .user-username {
            font-size: 12px;
            color: var(--text-light);
        }
        
        /* Список чатов */
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .chat-item {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .chat-item:hover {
            background: #e9ecef;
        }
        
        .chat-item.active {
            background: #e3f2fd;
        }
        
        .chat-icon {
            font-size: 24px;
            width: 36px;
            text-align: center;
        }
        
        .chat-name {
            font-weight: 500;
            color: var(--text);
        }
        
        /* Нижние кнопки */
        .sidebar-bottom {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
        }
        
        .bottom-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 22px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        
        .bottom-btn:hover {
            transform: scale(1.05);
            background: var(--primary-dark);
        }
        
        /* Область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        
        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
        }
        
        .chat-header .avatar {
            width: 40px;
            height: 40px;
        }
        
        .chat-name-header {
            font-weight: 600;
            font-size: 18px;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .messages {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .message-own {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message-other {
            align-self: flex-start;
            background: #f1f3f5;
            color: var(--text);
            border-bottom-left-radius: 4px;
        }
        
        .message-info {
            font-size: 11px;
            margin-bottom: 4px;
            opacity: 0.7;
        }
        
        /* Поле ввода */
        .message-input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            background: white;
        }
        
        .message-input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid var(--border);
            border-radius: 28px;
            outline: none;
            font-size: 15px;
            transition: border 0.2s;
        }
        
        .message-input:focus {
            border-color: var(--primary);
        }
        
        .send-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .send-btn:hover {
            background: var(--primary-dark);
        }
        
        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }
        
        .modal-content {
            background: white;
            margin: 10vh auto;
            padding: 28px;
            width: 450px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 24px;
            position: relative;
        }
        
        .close {
            position: absolute;
            right: 20px;
            top: 16px;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-light);
        }
        
        .close:hover {
            color: var(--text);
        }
        
        .auth-input, .modal-input {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
        }
        
        .auth-btn, .modal-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 12px;
            font-weight: 500;
        }
        
        .auth-btn.google {
            background: #4285f4;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .auth-btn.danger {
            background: #dc3545;
        }
        
        .auth-btn:hover {
            opacity: 0.9;
        }
        
        .small-btn {
            padding: 6px 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .user-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .profile-info {
            margin: 16px 0;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 12px;
        }
        
        .profile-info code {
            word-break: break-all;
            font-size: 12px;
        }
        
        hr {
            margin: 16px 0;
            border: none;
            border-top: 1px solid var(--border);
        }
        
        .avatar-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .avatar-large {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
        }
        
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <!-- АВТОРИЗАЦИЯ -->
    <div id="auth-screen" class="screen">
        <div class="auth-container">
            <h1>WR GRAM</h1>
            <h2>Войдите через Google</h2>
            <div id="g_id_onload"
                 data-client_id="727787416139-otser0351cpqlfsj96cl8r1j5t65grur.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleGoogleLogin"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
        </div>
    </div>

    <!-- ЗАВЕРШЕНИЕ РЕГИСТРАЦИИ -->
    <div id="complete-reg-screen" class="screen" style="display: none;">
        <div class="auth-container">
            <h2>✨ Завершите профиль</h2>
            <input type="text" id="complete-name" placeholder="Имя" class="auth-input">
            <input type="text" id="complete-lastname" placeholder="Фамилия" class="auth-input">
            <input type="text" id="complete-username" placeholder="Юзернейм" class="auth-input">
            <select id="complete-country" class="auth-input">
                <option>Россия</option><option>США</option><option>Германия</option><option>Франция</option>
                <option>Великобритания</option><option>Канада</option><option>Япония</option>
            </select>
            <button id="complete-btn" class="auth-btn">Продолжить →</button>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="main-screen" class="screen" style="display: none;">
        <div class="main-container">
            <div class="sidebar">
                <div class="sidebar-header" id="profile-btn-mobile">
                    <img class="avatar" id="sidebar-avatar" src="" alt="">
                    <div class="user-info">
                        <div class="user-name" id="sidebar-name"></div>
                        <div class="user-username" id="sidebar-username"></div>
                    </div>
                </div>
                <div class="chats-list" id="chats-list"></div>
                <div class="sidebar-bottom">
                    <button class="bottom-btn" id="new-chat-btn">➕</button>
                    <button class="bottom-btn" id="profile-btn">👤</button>
                </div>
            </div>
            
            <div class="chat-area">
                <div class="chat-header">
                    <div class="avatar" id="chat-avatar">💬</div>
                    <div class="chat-name-header" id="chat-name">Избранное</div>
                </div>
                <div class="messages-area">
                    <div class="messages" id="messages"></div>
                </div>
                <div class="message-input-area">
                    <input type="text" id="message-input" placeholder="Сообщение..." class="message-input">
                    <button id="send-btn" class="send-btn">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКИ -->
    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Мой профиль</h3>
            <div style="text-align: center;">
                <img class="avatar avatar-large" id="modal-avatar" src="">
            </div>
            <div class="profile-info">
                <strong>ID:</strong><br>
                <code id="profile-id"></code>
                <button id="copy-id-btn" class="small-btn" style="margin-left: 8px;">📋</button>
            </div>
            <input id="edit-name" placeholder="Имя" class="modal-input">
            <input id="edit-lastname" placeholder="Фамилия" class="modal-input">
            <input id="edit-username" placeholder="Юзернейм" class="modal-input">
            <select id="edit-country" class="modal-input">
                <option>Россия</option><option>США</option><option>Германия</option>
            </select>
            <button id="save-profile-btn" class="auth-btn">Сохранить</button>
            <hr>
            <button id="logout-btn" class="auth-btn">Выйти</button>
            <button id="delete-account-btn" class="auth-btn danger">Удалить аккаунт</button>
        </div>
    </div>

    <div id="new-chat-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Новый чат</h3>
            <button id="create-group-btn" class="auth-btn">Создать группу</button>
            <div style="margin: 16px 0; font-weight: 500;">Все пользователи:</div>
            <div id="users-list"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://wrgram.yurashiry.workers.dev';
        let currentUser = null;
        let currentChat = { id: 'favorites', name: 'Избранное' };
        let refreshInterval = null;

        async function apiRequest(endpoint, method, data = null) {
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (data) options.body = JSON.stringify(data);
            const response = await fetch(`${API_URL}${endpoint}`, options);
            const result = await response.json();
            if (!response.ok) throw new Error(result.error || 'Request failed');
            return result;
        }

        // GOOGLE LOGIN
        window.handleGoogleLogin = async (response) => {
            try {
                const result = await apiRequest('/api/google-login', 'POST', { credential: response.credential });
                if (result.user) {
                    currentUser = result.user;
                    if (!currentUser.name || !currentUser.username) {
                        document.getElementById('auth-screen').style.display = 'none';
                        document.getElementById('complete-reg-screen').style.display = 'flex';
                    } else {
                        document.getElementById('auth-screen').style.display = 'none';
                        document.getElementById('main-screen').style.display = 'flex';
                        initMainScreen();
                    }
                }
            } catch (error) {
                alert('Ошибка входа: ' + error.message);
            }
        };

        async function completeRegistration() {
            const name = document.getElementById('complete-name').value;
            const lastname = document.getElementById('complete-lastname').value;
            const username = document.getElementById('complete-username').value;
            const country = document.getElementById('complete-country').value;
            if (!name || !lastname || !username || !country) { alert('Заполните все поля'); return; }
            try {
                const result = await apiRequest('/api/complete-registration', 'POST', {
                    userId: currentUser.id, name, lastname, username, country, avatar: currentUser.avatar
                });
                currentUser = { ...currentUser, ...result.user };
                document.getElementById('complete-reg-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'flex';
                initMainScreen();
            } catch(error) { alert(error.message); }
        }

        function updateUI() {
            document.getElementById('sidebar-name').innerText = `${currentUser.name || ''} ${currentUser.lastname || ''}`;
            document.getElementById('sidebar-username').innerText = `@${currentUser.username || 'user'}`;
            const avatarEl = document.getElementById('sidebar-avatar');
            if (currentUser.avatar) {
                avatarEl.src = currentUser.avatar;
            } else {
                avatarEl.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                avatarEl.src = '';
            }
        }

        async function initMainScreen() {
            updateUI();
            await loadChats();
            startPolling();
            
            document.getElementById('new-chat-btn').onclick = () => document.getElementById('new-chat-modal').style.display = 'block';
            document.getElementById('profile-btn').onclick = () => { openProfile(); document.getElementById('profile-modal').style.display = 'block'; };
            document.getElementById('profile-btn-mobile').onclick = () => { openProfile(); document.getElementById('profile-modal').style.display = 'block'; };
            document.getElementById('send-btn').onclick = sendMessage;
            document.getElementById('message-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
            document.querySelectorAll('.close').forEach(close => close.onclick = () => close.closest('.modal').style.display = 'none');
            document.getElementById('save-profile-btn').onclick = saveProfile;
            document.getElementById('logout-btn').onclick = () => { location.reload(); };
            document.getElementById('delete-account-btn').onclick = deleteAccount;
            document.getElementById('copy-id-btn').onclick = () => navigator.clipboard.writeText(currentUser.id);
            document.getElementById('create-group-btn').onclick = createGroup;
        }

        async function loadChats() {
            try {
                const chats = await apiRequest('/api/chats', 'POST', { userId: currentUser.id });
                const container = document.getElementById('chats-list');
                container.innerHTML = '';
                chats.forEach(chat => {
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.innerHTML = `<div class="chat-icon">${chat.type === 'group' ? '👥' : '💬'}</div><div class="chat-name">${chat.name}</div>`;
                    div.onclick = () => openChat(chat.id, chat.name);
                    container.appendChild(div);
                });
                openChat('favorites', 'Избранное');
            } catch(error) { console.error(error); }
        }

        async function createGroup() {
            const name = prompt('Название группы:');
            if (!name) return;
            await apiRequest('/api/chat', 'POST', { userId: currentUser.id, type: 'group', name, members: [] });
            await loadChats();
            document.getElementById('new-chat-modal').style.display = 'none';
        }

        async function openChat(chatId, chatName) {
            currentChat = { id: chatId, name: chatName };
            document.getElementById('chat-name').innerText = chatName;
            await loadMessages();
        }

        async function loadMessages() {
            if (currentChat.id === 'favorites') {
                renderMessages([]);
                return;
            }
            try {
                const messages = await apiRequest(`/api/messages/${currentChat.id}`, 'GET');
                renderMessages(messages);
            } catch(error) { console.error(error); }
        }

        function renderMessages(messages) {
            const container = document.getElementById('messages');
            container.innerHTML = '';
            messages.forEach(msg => {
                const isOwn = msg.from_user === currentUser.id;
                const div = document.createElement('div');
                div.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
                div.innerHTML = `<div class="message-text">${escapeHtml(msg.content || msg.text || '')}</div>`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const text = document.getElementById('message-input').value;
            if (!text.trim()) return;
            document.getElementById('message-input').value = '';
            if (currentChat.id === 'favorites') return;
            try {
                await apiRequest('/api/message', 'POST', { userId: currentUser.id, chatId: currentChat.id, text });
                await loadMessages();
            } catch(error) { alert('Ошибка: ' + error.message); }
        }

        function openProfile() {
            document.getElementById('profile-id').innerText = currentUser.id;
            document.getElementById('edit-name').value = currentUser.name || '';
            document.getElementById('edit-lastname').value = currentUser.lastname || '';
            document.getElementById('edit-username').value = currentUser.username || '';
            const modalAvatar = document.getElementById('modal-avatar');
            if (currentUser.avatar) {
                modalAvatar.src = currentUser.avatar;
            } else {
                modalAvatar.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                modalAvatar.src = '';
            }
        }

        async function saveProfile() {
            try {
                await apiRequest('/api/profile', 'PUT', {
                    userId: currentUser.id,
                    name: document.getElementById('edit-name').value,
                    lastname: document.getElementById('edit-lastname').value,
                    username: document.getElementById('edit-username').value,
                    country: document.getElementById('edit-country').value
                });
                currentUser.name = document.getElementById('edit-name').value;
                currentUser.lastname = document.getElementById('edit-lastname').value;
                currentUser.username = document.getElementById('edit-username').value;
                updateUI();
                alert('Профиль обновлён');
                document.getElementById('profile-modal').style.display = 'none';
            } catch(error) { alert(error.message); }
        }

        async function deleteAccount() {
            if (!confirm('Удалить аккаунт навсегда?')) return;
            await apiRequest('/api/delete-account', 'DELETE', { userId: currentUser.id });
            location.reload();
        }

        function escapeHtml(text) { if (!text) return ''; return text.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        function startPolling() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => { if (currentChat && currentChat.id !== 'favorites') loadMessages(); }, 3000);
        }

        document.getElementById('complete-btn').onclick = completeRegistration;
    </script>
</body>
</html>
